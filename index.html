<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f5f5f7">
  <script>
    (function(){var p=localStorage.getItem('theme-preference')||'system';var d=p==='dark'||(p==='system'&&matchMedia('(prefers-color-scheme:dark)').matches);document.documentElement.setAttribute('data-theme',d?'dark':'light');var m=document.querySelector('meta[name="theme-color"]');if(m)m.content=d?'#1a1a2e':'#f5f5f7'})()
  </script>
  <link rel="manifest" href="/trips/manifest.json">
  <link rel="apple-touch-icon" href="/trips/icons/apple-touch-icon.png">
  <link rel="icon" type="image/svg+xml" href="/trips/icons/icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="/trips/icons/icon-192.png">
  <title>Nuestros Viajes</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
