<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #222240;
  --text: #e8e6e3;
  --text-dim: #8a8a9a;
  --accent: #f0c27a;
  --accent2: #fc5c65;
  --day1: #f7b731;
  --day2: #26de81;
  --day3: #fc5c65;
  --day4: #a55eea;
  --blue: #4b7bec;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%; width: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── LAYOUT ─────────────────────────── */
.app {
  display: flex; flex-direction: column;
  height: 100%;
}

#map {
  flex: 1; min-height: 0;
  z-index: 1;
}

/* ── BOTTOM SHEET ───────────────────── */
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  max-height: 70vh;
  display: flex; flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,.5);
}

.sheet.collapsed { transform: translateY(calc(100% - 140px - var(--safe-bottom))); }
.sheet.expanded  { transform: translateY(0); }

.sheet-handle {
  display: flex; justify-content: center; padding: 10px 0 4px;
  cursor: grab; flex-shrink: 0;
}
.sheet-handle span {
  width: 40px; height: 4px;
  background: #444; border-radius: 4px;
}

/* ── DAY TABS ───────────────────────── */
.day-tabs {
  display: flex; gap: 6px;
  padding: 4px 16px 10px;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display:none; }

.day-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 24px;
  border: 1.5px solid #333;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.day-tab.active {
  background: var(--accent);
  color: #111;
  border-color: var(--accent);
}
.day-tab[data-day="1"].active { background: var(--day1); border-color: var(--day1); }
.day-tab[data-day="2"].active { background: var(--day2); border-color: var(--day2); color:#111; }
.day-tab[data-day="3"].active { background: var(--day3); border-color: var(--day3); }
.day-tab[data-day="4"].active { background: var(--day4); border-color: var(--day4); }
.day-tab[data-day="info"].active { background: var(--blue); border-color: var(--blue); }

/* ── SHEET CONTENT ──────────────────── */
.sheet-body {
  overflow-y: auto; flex: 1;
  padding: 0 16px 120px;
  -webkit-overflow-scrolling: touch;
}

.day-header {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin: 4px 0 4px;
  color: var(--text);
  line-height: 1.2;
}
.day-subtitle {
  font-size: 13px; color: var(--text-dim);
  margin-bottom: 14px;
}

/* ── DIRECTIONS BUTTON ──────────────── */
.directions-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  padding: 14px 20px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, #4285f4, #34a853);
  color: #fff;
  font-size: 15px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-bottom: 16px;
  text-decoration: none;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px rgba(66,133,244,.3);
}
.directions-btn:active { transform: scale(.97); }
.directions-btn svg { width:20px; height:20px; fill:#fff; }

/* ── PLACE CARDS ────────────────────── */
.place-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  border-left: 4px solid var(--accent);
  cursor: pointer;
  transition: background .2s;
}
.place-card:active { background: #2a2a4a; }

.place-card[data-day="1"] { border-left-color: var(--day1); }
.place-card[data-day="2"] { border-left-color: var(--day2); }
.place-card[data-day="3"] { border-left-color: var(--day3); }
.place-card[data-day="4"] { border-left-color: var(--day4); }

.place-time {
  font-size: 12px; font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 2px;
}
.place-card[data-day="1"] .place-time { color: var(--day1); }
.place-card[data-day="2"] .place-time { color: var(--day2); }
.place-card[data-day="3"] .place-time { color: var(--day3); }
.place-card[data-day="4"] .place-time { color: var(--day4); }

.place-name {
  font-weight: 700; font-size: 15px;
  margin-bottom: 4px;
  line-height: 1.3;
}
.place-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.5;
}
.place-desc a {
  color: var(--accent); text-decoration: underline;
}
.place-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px; font-weight: 600;
  margin-top: 6px;
  background: rgba(240,194,122,.15);
  color: var(--accent);
}
.place-tag.obligatorio {
  background: rgba(252,92,101,.15);
  color: var(--accent2);
}
.place-tag.gratis {
  background: rgba(38,222,129,.15);
  color: var(--day2);
}
.place-tag.reservar {
  background: rgba(165,94,234,.15);
  color: var(--day4);
}

/* ── INFO TAB ───────────────────────── */
.info-section { margin-bottom: 20px; }
.info-section h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; margin-bottom: 8px;
  color: var(--accent);
}
.info-item {
  padding: 8px 0;
  border-bottom: 1px solid #2a2a3a;
  font-size: 14px;
  line-height: 1.5;
}
.info-item:last-child { border:none; }
.info-item strong { color: var(--text); }

/* ── MAP MARKERS ────────────────────── */
.marker-icon {
  display: flex; align-items: center; justify-content: center;
  width: 32px; height: 32px;
  border-radius: 50%;
  color: #fff; font-weight: 800; font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  border: 2.5px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);

/* ── RESPONSIVE ─────────────────────── */
@media (min-width: 768px) {
  .sheet { max-width: 420px; left: 16px; right: auto; }
  .sheet.collapsed { transform: translateY(calc(100% - 160px)); }
}

/* ── LEAFLET OVERRIDES ──────────────── */
.leaflet-control-zoom { border-radius: 12px!important; overflow:hidden; }
.leaflet-control-zoom a {
  background: var(--surface)!important;
  color: var(--text)!important;
  border-color: #333!important;
  width: 36px!important; height: 36px!important;

.leaflet-popup-content-wrapper {
  background: var(--surface); color: var(--text);
  border-radius: var(--radius); font-family: 'DM Sans';
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
}
.leaflet-popup-tip { background: var(--surface); }
.leaflet-popup-content { font-size: 13px; line-height: 1.5; }
.leaflet-popup-content a { color: var(--accent); }
</style>
</head>

// Google Directions URLs (walking mode)
function makeDirectionsURL(places) {
  const pts = places.map(p => `${p.lat},${p.lng}`);
  const origin = pts[0];
  const dest = pts[pts.length - 1];
  const waypoints = pts.slice(1, -1).join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=walking`;
  if (waypoints) url += `&waypoints=${waypoints}`;
  return url;
}

      iconSize:[32,32], iconAnchor:[16,16]
    });
    const popup = `<b>${p.name}</b><br><span style="color:${day.color};font-weight:700">${p.time}</span> · ${p.dur}<br>${p.desc}${p.link ? '<br><a href="'+p.link+'" target="_blank">Más info →</a>' : ''}`;
    L.marker([p.lat, p.lng], {icon})
      .bindPopup(popup, {maxWidth:260})
      .addTo(group);
  });
  markerLayers[day.id] = group;
  group.addTo(map);
});

// ═══════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════

const sheet = document.getElementById('sheet');
const sheetBody = document.getElementById('sheetBody');
const dayTabs = document.getElementById('dayTabs');
let activeDay = 1;

// Build tabs
const tabsData = [
  ...DAYS.map(d => ({id:d.id, label:d.tab})),
  {id:'info', label:'ℹ️ Info útil'}
];

tabsData.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'day-tab' + (t.id === 1 ? ' active' : '');
  btn.dataset.day = t.id;
  btn.textContent = t.label;
  btn.onclick = () => selectDay(t.id);
  dayTabs.appendChild(btn);
});

function selectDay(id) {
  activeDay = id;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day == id));

  // Show/hide markers
  DAYS.forEach(d => {
    if (id === 'info') {
      markerLayers[d.id].addTo(map);
    } else if (d.id === id) {
      markerLayers[d.id].addTo(map);
    } else {
      map.removeLayer(markerLayers[d.id]);
    }
  });

  // Fit bounds
  if (id !== 'info') {
    const day = DAYS.find(d => d.id === id);
    const bounds = L.latLngBounds(day.places.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds, {padding:[60,40], maxZoom:14});
  } else {
    map.setView([59.325, 18.07], 13);
  }

  renderContent(id);
  sheet.classList.remove('collapsed');
  sheet.classList.add('expanded');
}

function renderContent(id) {
  if (id === 'info') {
    renderInfo();
    return;
  }
  const day = DAYS.find(d => d.id === id);
  let html = `<h2 class="day-header">${day.title}</h2>`;
  html += `<p class="day-subtitle">${day.subtitle}</p>`;
  html += `<a class="directions-btn" href="${makeDirectionsURL(day.places)}" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M22.43 10.59l-9.01-9.01c-.75-.75-2.07-.76-2.83 0l-9.01 9.01c-.77.76-.77 2.07 0 2.83l9.01 9.01c.38.38.88.57 1.41.57.53 0 1.03-.19 1.41-.57l9.01-9.01c.79-.76.79-2.08.01-2.83zm-7.93.41V14h-3v-2.5H8.5v-3h3V6l4.5 4.5-1.5.5z"/></svg>
    Abrir ruta del día en Google Maps
  </a>`;

  day.places.forEach(p => {
    let tagsHtml = '';
    if (p.tags) {
      p.tags.forEach(t => {
        const labels = {obligatorio:'⭐ Obligatorio', gratis:'🆓 Gratis', reservar:'📞 Reservar', mirador:'🌅 Mirador'};
        tagsHtml += `<span class="place-tag ${t}">${labels[t]||t}</span> `;
      });
    }
    html += `
      <div class="place-card" data-day="${day.id}" data-lat="${p.lat}" data-lng="${p.lng}">
        <div class="place-time">${p.time} · ${p.dur}</div>
        <div class="place-name">${p.name}</div>
        <div class="place-desc">${p.desc}${p.link ? ' <a href="'+p.link+'" target="_blank">Web →</a>' : ''}</div>
        ${tagsHtml}
      </div>`;
  });

  sheetBody.innerHTML = html;

  // Click to fly to place
  document.querySelectorAll('.place-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      const lat = parseFloat(card.dataset.lat);
      const lng = parseFloat(card.dataset.lng);
      map.flyTo([lat, lng], 16, {duration: 0.8});
    });
  });
}

function renderInfo() {
  let html = `<h2 class="day-header">Info práctica</h2>
    <p class="day-subtitle">Transporte, comida, reservas</p>`;

  html += `<div class="info-section"><h3>🚌 Transporte</h3>`;
  INFO.transport.forEach(i => html += `<div class="info-item"><strong>${i.label}:</strong> ${i.value}</div>`);
  html += `</div>`;

  html += `<div class="info-section"><h3>📞 Reservas pendientes</h3>`;
  INFO.reservas.forEach(i => html += `<div class="info-item"><strong>${i.label}:</strong> ${i.value}</div>`);
  html += `</div>`;

  html += `<div class="info-section"><h3>🍽️ Comida típica a probar</h3>`;
  INFO.food.forEach(i => html += `<div class="info-item"><strong>${i.label}</strong> — ${i.value}</div>`);
  html += `</div>`;

  html += `<div class="info-section"><h3>📅 Resumen de días</h3>`;
  DAYS.forEach(d => {
    html += `<div class="info-item"><strong style="color:${d.color}">Día ${d.id}:</strong> ${d.title}<br><span style="color:var(--text-dim);font-size:12px">${d.subtitle}</span></div>`;
  });
  html += `</div>`;

  sheetBody.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════════
// SHEET GESTURES
// ═══════════════════════════════════════════════════════════════════

const handle = document.getElementById('sheetHandle');
handle.addEventListener('click', () => {
  sheet.classList.toggle('collapsed');
  sheet.classList.toggle('expanded');
});

let touchStartY = 0;
handle.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
handle.addEventListener('touchend', e => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 40) { sheet.classList.add('collapsed'); sheet.classList.remove('expanded'); }
  if (dy < -40) { sheet.classList.remove('collapsed'); sheet.classList.add('expanded'); }
}, {passive:true});

// Initialize
renderContent(1);
setTimeout(() => map.invalidateSize(), 100);
</script>
</body>
</html>
