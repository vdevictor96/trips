<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Mis Viajes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #222240;
  --text: #e8e6e3;
  --text-dim: #8a8a9a;
  --accent: #f0c27a;
  --accent2: #fc5c65;
  --blue: #4b7bec;
  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%; width: 100%;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* ── TRIP SELECTOR ─────────────────── */
.trip-selector {
  height: 100%;
  overflow-y: auto;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.trip-selector.hidden { display: none; }

.trip-selector-header {
  padding: 60px 0 32px;
  text-align: center;
}
.trip-selector-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 32px;
  margin-bottom: 6px;
}
.trip-selector-header p {
  color: var(--text-dim);
  font-size: 15px;
}

.trip-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 800px;
  padding-bottom: 60px;
}

.trip-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  border: 1.5px solid #333;
}
.trip-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,.4);
  border-color: var(--accent);
}
.trip-card-emoji {
  font-size: 48px;
  margin-bottom: 12px;
}
.trip-card-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin-bottom: 4px;
}
.trip-card-dates {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 10px;
}
.trip-card-meta {
  display: flex; gap: 12px;
  font-size: 12px;
  color: var(--text-dim);
}
.trip-card-meta span {
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 8px;
}

/* ── LAYOUT ─────────────────────────── */
.app {
  display: flex; flex-direction: column;
  height: 100%;
}
.app.hidden { display: none; }

#map {
  flex: 1; min-height: 0;
  z-index: 1;
}

/* ── BACK BUTTON ───────────────────── */
.back-btn {
  position: fixed;
  top: 16px; right: 16px;
  z-index: 1100;
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid #333;
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: none;
  align-items: center; gap: 6px;
  box-shadow: 0 4px 20px rgba(0,0,0,.3);
  transition: background .15s;
}
.back-btn:hover { background: var(--surface2); }
.back-btn.visible { display: flex; }

/* ── BOTTOM SHEET ───────────────────── */
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  max-height: 70vh;
  display: flex; flex-direction: column;
  box-shadow: 0 -8px 40px rgba(0,0,0,.5);
}

.sheet.collapsed { transform: translateY(calc(100% - 140px - var(--safe-bottom))); }
.sheet.expanded  { transform: translateY(0); }

.sheet-handle {
  display: flex; justify-content: center; padding: 10px 0 4px;
  cursor: grab; flex-shrink: 0;
}
.sheet-handle span {
  width: 40px; height: 4px;
  background: #444; border-radius: 4px;
}

/* ── SEARCH BAR ────────────────────── */
.search-container {
  padding: 0 16px 8px;
  position: relative;
  flex-shrink: 0;
}
.search-input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  border-radius: 12px;
  border: 1.5px solid #333;
  background: var(--surface2);
  color: var(--text);
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color .2s;
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute;
  left: 28px;
  top: 11px;
  width: 16px;
  height: 16px;
  fill: var(--text-dim);
  pointer-events: none;
}
.search-results {
  position: absolute;
  top: 100%;
  left: 16px;
  right: 16px;
  background: var(--surface2);
  border-radius: 12px;
  max-height: 220px;
  overflow-y: auto;
  z-index: 2000;
  box-shadow: 0 8px 30px rgba(0,0,0,.5);
  display: none;
}
.search-results.visible { display: block; }
.search-result-item {
  padding: 10px 14px;
  cursor: pointer;
  border-bottom: 1px solid #2a2a3a;
  font-size: 14px;
  transition: background .15s;
}
.search-result-item:last-child { border: none; }
.search-result-item:hover, .search-result-item:active { background: #333355; }
.search-result-day {
  font-size: 11px;
  font-weight: 700;
  margin-left: 6px;
  opacity: .6;
}
.place-card.highlight {
  outline: 2px solid var(--accent);
  outline-offset: -2px;
}

/* ── DAY TABS ───────────────────────── */
.day-tabs {
  display: flex; gap: 6px;
  padding: 4px 16px 10px;
  overflow-x: auto; flex-shrink: 0;
  scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display:none; }

.day-tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 24px;
  border: 1.5px solid #333;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px; font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
}
.day-tab.active {
  background: var(--accent);
  color: #111;
  border-color: var(--accent);
}
.day-tab[data-day="info"].active { background: var(--blue); border-color: var(--blue); }

/* ── SHEET CONTENT ──────────────────── */
.sheet-body {
  overflow-y: auto; flex: 1;
  padding: 0 16px 120px;
  -webkit-overflow-scrolling: touch;
}

.day-header {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  margin: 4px 0 4px;
  color: var(--text);
  line-height: 1.2;
}
.day-subtitle {
  font-size: 13px; color: var(--text-dim);
  margin-bottom: 14px;
}

/* ── DIRECTIONS BUTTON ──────────────── */
.directions-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%;
  padding: 14px 20px;
  border-radius: var(--radius);
  border: none;
  background: linear-gradient(135deg, #4285f4, #34a853);
  color: #fff;
  font-size: 15px; font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  margin-bottom: 16px;
  text-decoration: none;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 0 4px 20px rgba(66,133,244,.3);
}
.directions-btn:active { transform: scale(.97); }
.directions-btn svg { width:20px; height:20px; fill:#fff; }

/* ── PLACE CARDS ────────────────────── */
.place-card {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  border-left: 4px solid var(--accent);
  cursor: pointer;
  transition: background .2s;
}
.place-card:active { background: #2a2a4a; }

.place-time {
  font-size: 12px; font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 2px;
}

.place-name {
  font-weight: 700; font-size: 15px;
  margin-bottom: 4px;
  line-height: 1.3;
  display: flex; align-items: center;
}
.place-desc {
  font-size: 13px; color: var(--text-dim);
  line-height: 1.5;
}
.place-desc a {
  color: var(--accent); text-decoration: underline;
}
.place-links {
  display: flex; gap: 10px; margin-top: 6px; font-size: 12px; font-weight: 600;
}
.place-links a {
  color: var(--accent); text-decoration: none;
  display: flex; align-items: center; gap: 3px;
}
.place-links a:hover { text-decoration: underline; }
.place-links .gmaps-link { color: #34a853; }
.place-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px; font-weight: 600;
  margin-top: 6px;
  background: rgba(240,194,122,.15);
  color: var(--accent);
}
.place-tag.obligatorio {
  background: rgba(252,92,101,.15);
  color: var(--accent2);
}
.place-tag.gratis {
  background: rgba(38,222,129,.15);
  color: #26de81;
}
.place-tag.reservar {
  background: rgba(165,94,234,.15);
  color: #a55eea;
}
.place-tag.descartado {
  background: rgba(138,138,154,.15);
  color: var(--text-dim);
}
.place-card[data-day="discarded"] { border-left-color: #666; }
.place-card[data-day="discarded"] .place-time { display: none; }

/* ── INFO TAB ───────────────────────── */
.info-section { margin-bottom: 20px; }
.info-section h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 17px; margin-bottom: 8px;
  color: var(--accent);
}
.info-item {
  padding: 8px 0;
  border-bottom: 1px solid #2a2a3a;
  font-size: 14px;
  line-height: 1.5;
}
.info-item:last-child { border:none; }
.info-item strong { color: var(--text); }

/* ── MAP MARKERS ────────────────────── */
.marker-icon {
  display: flex; align-items: center; justify-content: center;
  width: 30px; height: 40px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  color: #fff; font-weight: 800; font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  border: 2.5px solid #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
  transition: width .2s, height .2s, font-size .2s;
}
.marker-icon span {
  transform: rotate(45deg);
}
.marker-icon.active {
  width: 38px; height: 50px;
  font-size: 14px;
  border-width: 3px;
  filter: drop-shadow(0 0 6px rgba(255,255,255,.5));
}

/* ── PLACE NUMBER BADGE ────────────── */
.place-number {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  color: #fff; font-weight: 800; font-size: 11px;
  margin-right: 6px;
  vertical-align: middle;
  flex-shrink: 0;
}
.place-number span {
  transform: rotate(45deg);
}

/* ── RESPONSIVE ─────────────────────── */
@media (min-width: 768px) {
  .sheet { max-width: 420px; left: 16px; right: auto; }
  .sheet.collapsed { transform: translateY(calc(100% - 160px)); }
}

/* ── LEAFLET OVERRIDES ──────────────── */
.leaflet-control-zoom { border-radius: 12px!important; overflow:hidden; }
.leaflet-control-zoom a {
  background: #fff!important;
  color: #333!important;
  border-color: #ccc!important;
  width: 36px!important; height: 36px!important;
  line-height: 36px!important; font-size: 18px!important;
}
.leaflet-popup-content-wrapper {
  background: #fff; color: #222;
  border-radius: var(--radius); font-family: 'DM Sans';
  box-shadow: 0 4px 20px rgba(0,0,0,.15);
}
.leaflet-popup-tip { background: #fff; }
.leaflet-popup-content { font-size: 13px; line-height: 1.5; }
.leaflet-popup-content a { color: #2563eb; }
</style>
</head>
<body>

<!-- ── TRIP SELECTOR ───────────────── -->
<div class="trip-selector" id="tripSelector">
  <div class="trip-selector-header">
    <h1>Mis Viajes</h1>
    <p>Elige un viaje para ver el itinerario</p>
  </div>
  <div class="trip-grid" id="tripGrid"></div>
</div>

<!-- ── MAP APP ─────────────────────── -->
<div class="app hidden" id="app">
  <div id="map"></div>
  <button class="back-btn" id="backBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Viajes
  </button>
  <div class="sheet collapsed" id="sheet">
    <div class="sheet-handle" id="sheetHandle"><span></span></div>
    <div class="search-container">
      <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar sitio..." autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="day-tabs" id="dayTabs"></div>
    <div class="sheet-body" id="sheetBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════

let trip = null;        // Current loaded trip data
let map = null;         // Leaflet map instance
let markerLayers = {};  // Day marker layer groups
let markerById = {};    // placeId → L.marker reference
let activeMarker = null;// Currently highlighted marker
let allPlaces = [];     // Flat list of all places (for search)
let activeDay = null;
let dynamicStyleEl = null;

const DEFAULT_COLORS = ['#f7b731','#26de81','#fc5c65','#a55eea','#4b7bec','#fd9644','#2bcbba','#eb3b5a'];

// ═══════════════════════════════════════════════════════════════════
// TRIP SELECTOR
// ═══════════════════════════════════════════════════════════════════

async function init() {
  const res = await fetch('trips/index.json');
  const data = await res.json();
  renderTripGrid(data.trips);

  // Deep link: check URL hash
  const hash = location.hash.replace('#','');
  if (hash) {
    const found = data.trips.find(t => t.id === hash);
    if (found) loadTrip(found.id);
  }
}

function renderTripGrid(trips) {
  const grid = document.getElementById('tripGrid');
  grid.innerHTML = trips.map(t => `
    <div class="trip-card" data-id="${t.id}">
      <div class="trip-card-emoji">${t.emoji}</div>
      <div class="trip-card-title">${t.title}</div>
      <div class="trip-card-dates">${t.dates}</div>
      <div class="trip-card-meta">
        <span>${t.days} días</span>
        <span>${t.places} sitios</span>
        <span>${t.city}, ${t.country}</span>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.trip-card').forEach(card => {
    card.addEventListener('click', () => loadTrip(card.dataset.id));
  });
}

// ═══════════════════════════════════════════════════════════════════
// LOAD TRIP
// ═══════════════════════════════════════════════════════════════════

async function loadTrip(tripId) {
  const res = await fetch(`trips/${tripId}.json`);
  trip = await res.json();

  document.title = trip.title;
  location.hash = trip.id;

  // Show app, hide selector
  document.getElementById('tripSelector').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('backBtn').classList.add('visible');

  // Assign colors to days
  const colors = trip.dayColors || DEFAULT_COLORS;
  trip.days.forEach((d, i) => { d.color = colors[i % colors.length]; });

  // Inject dynamic day CSS
  injectDayStyles(trip.days);

  // Init or reset map
  initMap();

  // Build markers
  buildMarkers();

  // Build tabs
  buildTabs();

  // Build search index (includes discarded)
  allPlaces = trip.days.flatMap(d => d.places.map(p => ({...p, dayId:d.id, dayTab:d.tab, dayColor:d.color})));
  if (trip.discarded && trip.discarded.length) {
    allPlaces.push(...trip.discarded.map(p => ({...p, dayId:'discarded', dayTab:'Descartados', dayColor:'#666'})));
  }
  setupSearch();

  // Render first day
  activeDay = trip.days[0].id;
  selectDay(activeDay);

  // Setup gestures
  setupGestures();
}

function goBack() {
  document.getElementById('tripSelector').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  document.getElementById('backBtn').classList.remove('visible');
  document.title = 'Mis Viajes';
  location.hash = '';

  // Destroy map
  if (map) { map.remove(); map = null; }
  markerLayers = {};
  markerById = {};
  activeMarker = null;

  // Clear dynamic styles
  if (dynamicStyleEl) { dynamicStyleEl.remove(); dynamicStyleEl = null; }

  // Clear tabs
  document.getElementById('dayTabs').innerHTML = '';
}

// ═══════════════════════════════════════════════════════════════════
// DYNAMIC DAY STYLES
// ═══════════════════════════════════════════════════════════════════

function injectDayStyles(days) {
  if (dynamicStyleEl) dynamicStyleEl.remove();
  dynamicStyleEl = document.createElement('style');
  let css = '';
  days.forEach(d => {
    css += `.day-tab[data-day="${d.id}"].active { background:${d.color}; border-color:${d.color}; color:#111; }\n`;
    css += `.place-card[data-day="${d.id}"] { border-left-color:${d.color}; }\n`;
    css += `.place-card[data-day="${d.id}"] .place-time { color:${d.color}; }\n`;
  });
  dynamicStyleEl.textContent = css;
  document.head.appendChild(dynamicStyleEl);
}

// ═══════════════════════════════════════════════════════════════════
// MAP SETUP
// ═══════════════════════════════════════════════════════════════════

function initMap() {
  if (map) { map.remove(); map = null; }
  markerLayers = {};

  map = L.map('map', {
    center: trip.mapCenter,
    zoom: trip.mapZoom,
    zoomControl: true,
    attributionControl: false,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    maxZoom: 19,
  }).addTo(map);

  setTimeout(() => map.invalidateSize(), 100);
}

function buildMarkers() {
  markerById = {};
  activeMarker = null;

  // Hotel marker
  if (trip.hotel) {
    const hotelIcon = L.divIcon({
      className:'',
      html:`<div class="marker-icon" style="background:#4b7bec;"><span>H</span></div>`,
      iconSize:[30,40], iconAnchor:[15,40]
    });
    L.marker([trip.hotel.lat, trip.hotel.lng], {icon:hotelIcon})
      .bindPopup(`<b>🏨 ${trip.hotel.name}</b><br>Hotel base`)
      .addTo(map);
  }

  trip.days.forEach(day => {
    const group = L.layerGroup();
    day.places.forEach((p, idx) => {
      const icon = L.divIcon({
        className:'',
        html:`<div class="marker-icon" style="background:${day.color};"><span>${idx+1}</span></div>`,
        iconSize:[30,40], iconAnchor:[15,40]
      });
      const gmapLink = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
      const popup = `<b>${p.name}</b><br><span style="color:${day.color};font-weight:700">${p.time}</span> · ${p.dur}<br>${p.desc}<br><a href="${gmapLink}" target="_blank" style="color:#34a853">📍 Google Maps</a>${p.link ? ' · <a href="'+p.link+'" target="_blank">Más info →</a>' : ''}`;
      const marker = L.marker([p.lat, p.lng], {icon})
        .bindPopup(popup, {maxWidth:260})
        .addTo(group);
      markerById[p.id] = marker;

      // Click marker → highlight corresponding card
      marker.on('click', () => {
        if (activeDay !== day.id) selectDay(day.id);
        setTimeout(() => {
          const card = document.querySelector(`.place-card[data-id="${p.id}"]`);
          if (card) {
            card.scrollIntoView({behavior:'smooth', block:'center'});
            card.classList.add('highlight');
            setTimeout(() => card.classList.remove('highlight'), 2000);
          }
          const sheet = document.getElementById('sheet');
          sheet.classList.remove('collapsed');
          sheet.classList.add('expanded');
          // Activate marker
          if (activeMarker && activeMarker._icon) {
            activeMarker._icon.querySelector('.marker-icon')?.classList.remove('active');
          }
          if (marker._icon) marker._icon.querySelector('.marker-icon')?.classList.add('active');
          activeMarker = marker;
        }, 350);
      });
    });
    markerLayers[day.id] = group;
    group.addTo(map);
  });

  // Discarded markers (gray, hidden by default)
  if (trip.discarded && trip.discarded.length) {
    const group = L.layerGroup();
    trip.discarded.forEach(p => {
      const icon = L.divIcon({
        className:'',
        html:`<div class="marker-icon" style="background:#666;opacity:.7;"><span>✕</span></div>`,
        iconSize:[30,40], iconAnchor:[15,40]
      });
      const gmapLink = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
      const popup = `<b>${p.name}</b><br><span style="color:#999">${p.reason}</span><br>${p.desc}<br><a href="${gmapLink}" target="_blank" style="color:#34a853">📍 Google Maps</a>${p.link ? ' · <a href="'+p.link+'" target="_blank">Web →</a>' : ''}`;
      L.marker([p.lat, p.lng], {icon}).bindPopup(popup, {maxWidth:260}).addTo(group);
    });
    markerLayers['discarded'] = group;
  }
}

// ═══════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════

function buildTabs() {
  const dayTabs = document.getElementById('dayTabs');
  dayTabs.innerHTML = '';
  const tabsData = [
    ...trip.days.map(d => ({id:d.id, label:d.tab})),
    {id:'info', label:'ℹ️ Info útil'}
  ];
  if (trip.discarded && trip.discarded.length) {
    tabsData.push({id:'discarded', label:'🗑️ Descartados'});
  }
  tabsData.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'day-tab';
    btn.dataset.day = t.id;
    btn.textContent = t.label;
    btn.onclick = () => {
      if (t.id === activeDay) {
        selectDay(null); // toggle off → overview
      } else {
        selectDay(t.id);
      }
    };
    dayTabs.appendChild(btn);
  });
}

function selectDay(id) {
  activeDay = id;

  // Reset active marker
  if (activeMarker && activeMarker._icon) {
    activeMarker._icon.querySelector('.marker-icon')?.classList.remove('active');
  }
  activeMarker = null;

  document.querySelectorAll('.day-tab').forEach(t => t.classList.toggle('active', t.dataset.day == id));

  // Show/hide markers
  trip.days.forEach(d => {
    if (id === null || id === 'info') {
      markerLayers[d.id].addTo(map);
    } else if (d.id === id) {
      markerLayers[d.id].addTo(map);
    } else {
      map.removeLayer(markerLayers[d.id]);
    }
  });
  // Discarded markers
  if (markerLayers['discarded']) {
    if (id === 'discarded') {
      markerLayers['discarded'].addTo(map);
    } else {
      map.removeLayer(markerLayers['discarded']);
    }
  }

  // Fit bounds
  if (id === null) {
    // Overview: fit all day places
    const allPts = trip.days.flatMap(d => d.places.map(p => [p.lat, p.lng]));
    if (allPts.length) {
      map.fitBounds(L.latLngBounds(allPts), {padding:[60,40], maxZoom:13});
    }
  } else if (id === 'discarded' && trip.discarded && trip.discarded.length) {
    const bounds = L.latLngBounds(trip.discarded.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds, {padding:[60,40], maxZoom:13});
  } else if (id !== 'info' && id !== 'discarded') {
    const day = trip.days.find(d => d.id === id);
    const bounds = L.latLngBounds(day.places.map(p => [p.lat, p.lng]));
    map.fitBounds(bounds, {padding:[60,40], maxZoom:14});
  } else {
    map.setView(trip.mapCenter, trip.mapZoom);
  }

  renderContent(id);

  const sheet = document.getElementById('sheet');
  sheet.classList.remove('collapsed');
  sheet.classList.add('expanded');
}

// Google Directions URLs (walking mode) — usa nombres de lugar
function makeDirectionsURL(places) {
  const clean = n => n.replace(/[⭐🌅]/g,'').replace(/\s*\(.*?\)\s*/g,' ').trim();
  const location = trip.city + ', ' + trip.country;
  const pts = places.map(p => encodeURIComponent(clean(p.name) + ', ' + location));
  const origin = pts[0];
  const dest = pts[pts.length - 1];
  const waypoints = pts.slice(1, -1).join('|');
  let url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&travelmode=walking`;
  if (waypoints) url += `&waypoints=${waypoints}`;
  return url;
}

function renderContent(id) {
  const sheetBody = document.getElementById('sheetBody');
  if (id === null) { renderOverview(); return; }
  if (id === 'info') { renderInfo(); return; }
  if (id === 'discarded') { renderDiscarded(); return; }
  const day = trip.days.find(d => d.id === id);
  let html = `<h2 class="day-header">${day.title}</h2>`;
  html += `<p class="day-subtitle">${day.subtitle}</p>`;
  html += `<a class="directions-btn" href="${makeDirectionsURL(day.places)}" target="_blank">
    <svg viewBox="0 0 24 24"><path d="M22.43 10.59l-9.01-9.01c-.75-.75-2.07-.76-2.83 0l-9.01 9.01c-.77.76-.77 2.07 0 2.83l9.01 9.01c.38.38.88.57 1.41.57.53 0 1.03-.19 1.41-.57l9.01-9.01c.79-.76.79-2.08.01-2.83zm-7.93.41V14h-3v-2.5H8.5v-3h3V6l4.5 4.5-1.5.5z"/></svg>
    Abrir ruta del día en Google Maps
  </a>`;

  day.places.forEach((p, idx) => {
    let tagsHtml = '';
    if (p.tags) {
      p.tags.forEach(t => {
        const labels = {obligatorio:'⭐ Obligatorio', gratis:'🆓 Gratis', reservar:'📞 Reservar', mirador:'🌅 Mirador'};
        tagsHtml += `<span class="place-tag ${t}">${labels[t]||t}</span> `;
      });
    }
    const gmapUrl = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
    html += `
      <div class="place-card" data-day="${day.id}" data-id="${p.id}" data-lat="${p.lat}" data-lng="${p.lng}">
        <div class="place-time">${p.time} · ${p.dur}</div>
        <div class="place-name"><span class="place-number" style="background:${day.color}"><span>${idx+1}</span></span> ${p.name}</div>
        <div class="place-desc">${p.desc}</div>
        <div class="place-links">
          <a class="gmaps-link" href="${gmapUrl}" target="_blank">📍 Google Maps</a>
          ${p.link ? '<a href="'+p.link+'" target="_blank">🔗 Web</a>' : ''}
        </div>
        ${tagsHtml}
      </div>`;
  });

  sheetBody.innerHTML = html;

  // Click to fly to place + activate marker
  document.querySelectorAll('.place-card[data-id]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      const lat = parseFloat(card.dataset.lat);
      const lng = parseFloat(card.dataset.lng);
      map.flyTo([lat, lng], 16, {duration: 0.8});

      // Activate marker on map
      const markerObj = markerById[card.dataset.id];
      if (markerObj) {
        if (activeMarker && activeMarker._icon) {
          activeMarker._icon.querySelector('.marker-icon')?.classList.remove('active');
        }
        if (markerObj._icon) markerObj._icon.querySelector('.marker-icon')?.classList.add('active');
        activeMarker = markerObj;
      }
    });
  });
}

function renderOverview() {
  const sheetBody = document.getElementById('sheetBody');
  let html = `<h2 class="day-header">Vista general</h2>
    <p class="day-subtitle">Todos los días del viaje. Toca un día para ver detalles.</p>`;

  trip.days.forEach(d => {
    html += `
      <div class="place-card" data-day="${d.id}" style="border-left-color:${d.color};cursor:pointer;">
        <div class="place-time" style="color:${d.color}">Día ${d.id} · ${d.places.length} sitios</div>
        <div class="place-name">${d.title}</div>
        <div class="place-desc" style="color:var(--text-dim)">${d.subtitle}</div>
      </div>`;
  });

  sheetBody.innerHTML = html;

  // Click on overview card → select that day
  sheetBody.querySelectorAll('.place-card[data-day]').forEach(card => {
    card.addEventListener('click', () => {
      selectDay(parseInt(card.dataset.day));
    });
  });
}

function renderInfo() {
  const sheetBody = document.getElementById('sheetBody');
  let html = `<h2 class="day-header">Info práctica</h2>
    <p class="day-subtitle">Transporte, comida, reservas</p>`;

  if (trip.info.transport && trip.info.transport.length) {
    html += `<div class="info-section"><h3>🚌 Transporte</h3>`;
    trip.info.transport.forEach(i => html += `<div class="info-item"><strong>${i.label}:</strong> ${i.value}</div>`);
    html += `</div>`;
  }

  if (trip.info.reservas && trip.info.reservas.length) {
    html += `<div class="info-section"><h3>📞 Reservas pendientes</h3>`;
    trip.info.reservas.forEach(i => html += `<div class="info-item"><strong>${i.label}:</strong> ${i.value}</div>`);
    html += `</div>`;
  }

  if (trip.info.food && trip.info.food.length) {
    html += `<div class="info-section"><h3>🍽️ Comida típica a probar</h3>`;
    trip.info.food.forEach(i => html += `<div class="info-item"><strong>${i.label}</strong> — ${i.value}</div>`);
    html += `</div>`;
  }

  html += `<div class="info-section"><h3>📅 Resumen de días</h3>`;
  trip.days.forEach(d => {
    html += `<div class="info-item"><strong style="color:${d.color}">Día ${d.id}:</strong> ${d.title}<br><span style="color:var(--text-dim);font-size:12px">${d.subtitle}</span></div>`;
  });
  html += `</div>`;

  sheetBody.innerHTML = html;
}

function renderDiscarded() {
  const sheetBody = document.getElementById('sheetBody');
  if (!trip.discarded || !trip.discarded.length) return;
  let html = `<h2 class="day-header">Sitios descartados</h2>
    <p class="day-subtitle">Sitios investigados pero no incluidos en el plan. Toca para ver en el mapa.</p>`;

  trip.discarded.forEach(p => {
    const gmapUrl = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
    html += `
      <div class="place-card" data-day="discarded" data-id="${p.id}" data-lat="${p.lat}" data-lng="${p.lng}">
        <div class="place-name">${p.name}</div>
        <div class="place-desc">${p.desc}</div>
        <div class="place-links">
          <a class="gmaps-link" href="${gmapUrl}" target="_blank">📍 Google Maps</a>
          ${p.link ? '<a href="'+p.link+'" target="_blank">🔗 Web</a>' : ''}
        </div>
        <span class="place-tag descartado">🚫 ${p.reason}</span>
      </div>`;
  });

  sheetBody.innerHTML = html;

  document.querySelectorAll('.place-card[data-day="discarded"]').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.tagName === 'A') return;
      const lat = parseFloat(card.dataset.lat);
      const lng = parseFloat(card.dataset.lng);
      map.flyTo([lat, lng], 16, {duration: 0.8});
    });
  });
}

// ═══════════════════════════════════════════════════════════════════
// SHEET GESTURES
// ═══════════════════════════════════════════════════════════════════

function setupGestures() {
  const sheet = document.getElementById('sheet');
  const handle = document.getElementById('sheetHandle');

  handle.onclick = () => {
    sheet.classList.toggle('collapsed');
    sheet.classList.toggle('expanded');
  };

  let touchStartY = 0;
  handle.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive:true});
  handle.addEventListener('touchend', e => {
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (dy > 40) { sheet.classList.add('collapsed'); sheet.classList.remove('expanded'); }
    if (dy < -40) { sheet.classList.remove('collapsed'); sheet.classList.add('expanded'); }
  }, {passive:true});
}

// ═══════════════════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════════════════

function setupSearch() {
  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');
  searchInput.value = '';
  searchResults.classList.remove('visible');

  // Remove old listener by replacing element
  const newInput = searchInput.cloneNode(true);
  searchInput.parentNode.replaceChild(newInput, searchInput);

  newInput.addEventListener('input', () => {
    const q = newInput.value.trim().toLowerCase();
    if (!q) { searchResults.classList.remove('visible'); return; }
    const matches = allPlaces.filter(p => p.name.toLowerCase().includes(q));
    if (!matches.length) {
      searchResults.innerHTML = '<div class="search-result-item" style="color:var(--text-dim)">Sin resultados</div>';
      searchResults.classList.add('visible');
      return;
    }
    searchResults.innerHTML = matches.map(p =>
      `<div class="search-result-item" data-day="${p.dayId}" data-id="${p.id}">${p.name}<span class="search-result-day" style="color:${p.dayColor}">${p.dayId === 'discarded' ? 'Descartados' : 'Día '+p.dayId}</span></div>`
    ).join('');
    searchResults.classList.add('visible');

    searchResults.querySelectorAll('.search-result-item[data-id]').forEach(item => {
      item.addEventListener('click', () => {
        const rawDay = item.dataset.day;
        const dayId = rawDay === 'discarded' ? 'discarded' : parseInt(rawDay);
        const placeId = item.dataset.id;
        const place = allPlaces.find(p => p.id === placeId);
        if (!place) return;
        selectDay(dayId);
        map.flyTo([place.lat, place.lng], 16, {duration: 0.8});
        setTimeout(() => {
          const card = document.querySelector(`.place-card[data-id="${placeId}"]`);
          if (card) {
            card.scrollIntoView({behavior:'smooth', block:'center'});
            card.classList.add('highlight');
            setTimeout(() => card.classList.remove('highlight'), 2000);
          }
        }, 400);
        newInput.value = '';
        searchResults.classList.remove('visible');
      });
    });
  });
}

// Close search results on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.search-container')) {
    document.getElementById('searchResults').classList.remove('visible');
  }
});

// Back button
document.getElementById('backBtn').addEventListener('click', goBack);

// Handle browser back/forward
window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#','');
  if (!hash && trip) goBack();
});

init();
